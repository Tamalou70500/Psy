<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dossier patient — Cabinet du Dr. Abernathy Lucius</title>
<script>(function(){ var t=localStorage.getItem('psy_theme')||'dark'; var f=localStorage.getItem('psy_font')||'victorien'; document.documentElement.setAttribute('data-theme',t); document.documentElement.setAttribute('data-font',f); })();</script>
<link rel="stylesheet" href="css/style.css">
<style>
/* ═══ FOND IMMERSIF ══════════════════════════════════════════ */
.pat-scene {
  position: fixed; inset: 0; z-index: 0;
  background: url('images/desk/Le fond principal .png') center center / cover no-repeat;
}
.pat-scene::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(10,6,2,0.42);
}

/* ═══ PANNEAU ════════════════════════════════════════════════ */
.pat-panel {
  position: fixed; inset: 0; z-index: 3;
  display: flex; flex-direction: column;
  padding-top: 54px; overflow: hidden;
}
.pat-inner {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  width: min(1100px, 96vw);
  margin: 0.75rem auto;
  background: color-mix(in srgb, var(--ink) 78%, transparent);
  border: 1px solid var(--bdr2);
  animation: patOpen 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes patOpen {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ═══ EN-TÊTE DU DOSSIER ════════════════════════════════════ */
.pat-header {
  display: flex; align-items: center; gap: 1.25rem;
  padding: 1rem 1.5rem 0.85rem;
  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
}
.pat-photo {
  width: 64px; height: 64px; border-radius: 50%;
  object-fit: cover; border: 2px solid var(--bdr2);
  filter: sepia(15%); flex-shrink: 0;
}
.pat-photo-ph {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--ink3); border: 2px solid var(--bdr2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 1.4rem;
  color: var(--parch3); flex-shrink: 0;
}
.pat-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; font-style: italic; color: var(--parch);
}
.pat-meta {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.82rem; color: var(--parch3);
  margin-top: 2px; display: flex; flex-wrap: wrap; gap: 0.5rem;
}
.pat-meta span { color: var(--parch2); }
.pat-actions { margin-left: auto; display: flex; gap: 0.5rem; flex-shrink: 0; }

/* ═══ CORPS — 2 COLONNES ════════════════════════════════════ */
.pat-body {
  flex: 1; display: flex; overflow: hidden;
}
.pat-left {
  width: 280px; flex-shrink: 0;
  border-right: 1px solid var(--bdr);
  overflow-y: auto; padding: 1.25rem;
  scrollbar-width: thin; scrollbar-color: var(--gold-d) transparent;
}
.pat-right {
  flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem;
  scrollbar-width: thin; scrollbar-color: var(--gold-d) transparent;
}

/* ═══ CHAMPS INFO ════════════════════════════════════════════ */
.info-section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold-d); margin-bottom: 0.75rem; margin-top: 1.25rem;
  border-bottom: 1px solid var(--bdr); padding-bottom: 4px;
}
.info-section-title:first-child { margin-top: 0; }
.info-row {
  display: flex; flex-direction: column;
  margin-bottom: 0.65rem;
}
.info-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--parch4); margin-bottom: 1px;
}
.info-value {
  font-family: 'EB Garamond', serif;
  font-size: 0.88rem; color: var(--parch2); line-height: 1.4;
}
.info-value.empty { color: var(--parch4); font-style: italic; }

/* ═══ SÉANCES ════════════════════════════════════════════════ */
.seances-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold-d); margin-bottom: 1rem;
  border-bottom: 1px solid var(--bdr); padding-bottom: 4px;
  display: flex; align-items: center; justify-content: space-between;
}
.seance-card {
  background: color-mix(in srgb, var(--ink2) 60%, transparent);
  border: 1px solid var(--bdr); border-left: 3px solid var(--gold-d);
  padding: 0.85rem 1rem; margin-bottom: 0.65rem; position: relative;
}
.seance-card-top {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 0.5rem;
}
.seance-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.72rem; letter-spacing: 0.1em; color: var(--gold);
}
.seance-medecin {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.7rem; color: var(--parch4); font-style: italic;
  cursor: pointer; border-bottom: 1px dotted var(--parch4);
  background: none; border-top: none; border-left: none; border-right: none; padding: 0;
}
.seance-medecin:hover { color: var(--gold); border-bottom-color: var(--gold); }

/* Popup profil médecin */
.med-popup-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center;
}
.med-popup-overlay.hidden { display: none; }
.med-popup {
  background: var(--ink2); border: 1px solid var(--bdr2);
  padding: 24px 28px; min-width: 260px; max-width: 340px; width: 90%;
  position: relative; text-align: center;
}
.med-popup-close {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; color: var(--parch3); cursor: pointer; font-size: 1rem;
}
.med-popup-photo {
  width: 80px; height: 80px; object-fit: cover;
  border: 2px solid var(--gold-d); margin: 0 auto 12px; display: block;
}
.med-popup-photo-ph {
  width: 80px; height: 80px; display:flex; align-items:center; justify-content:center;
  background: var(--ink3); border: 2px solid var(--bdr); margin: 0 auto 12px;
  font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--parch2); font-style: italic;
}
.med-popup-name {
  font-family: 'Playfair Display', serif; font-size: 1.1rem;
  color: var(--parch); margin-bottom: 4px;
}
.med-popup-cabinet {
  font-family: 'Cormorant Garamond', serif; font-size: 0.72rem;
  color: var(--parch3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px;
}
.med-popup-role {
  font-family: 'Cormorant Garamond', serif; font-size: 0.78rem;
  color: var(--gold); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px;
}
.med-popup-badges { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.med-popup-badge {
  font-size: 0.72rem; padding: 2px 8px;
  border: 1px solid var(--bdr); color: var(--parch3);
  font-family: 'Cormorant Garamond', serif;
}
.seance-type {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--parch3); margin-left: auto;
}
.seance-text {
  font-family: 'EB Garamond', serif;
  font-size: 0.88rem; color: var(--parch2); line-height: 1.6;
  white-space: pre-wrap;
}
.seance-del {
  position: absolute; top: 0.5rem; right: 0.5rem;
  background: none; border: none; color: var(--parch4);
  font-size: 0.7rem; cursor: pointer; padding: 2px 5px;
}
.seance-del:hover { color: #c07070; }
.seances-empty {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem; color: var(--parch4); font-style: italic;
  text-align: center; padding: 2rem 0;
}

/* ═══ NAVBAR ════════════════════════════════════════════════ */
nav.navbar {
  position: fixed !important; top:0; left:0; right:0; z-index:10 !important;
  background: color-mix(in srgb, var(--ink) 92%, transparent) !important;
  backdrop-filter: blur(12px);
}

/* ═══ OVERLAY ÉDITION ════════════════════════════════════════ */
.edit-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; display: flex; align-items: center; justify-content: center;
}
.edit-overlay.hidden { display: none; }
.edit-panel {
  background: var(--ink2); border: 1px solid var(--bdr2);
  padding: 1.75rem; width: min(560px, 95vw); max-height: 90vh; overflow-y: auto;
}
.edit-title {
  font-family: 'Playfair Display', serif; font-size: 1.1rem;
  color: var(--parch); margin-bottom: 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
}

/* ═══ MOBILE ════════════════════════════════════════════════ */
@media(max-width:768px){
  .pat-scene { display: none; }
  nav.navbar { position: sticky !important; }
  .pat-panel { position: static; padding-top: 0; overflow: visible; }
  .pat-inner { width: 100%; margin: 0; background: var(--ink); border: none; animation: none; }
  .pat-body { flex-direction: column; overflow: visible; }
  .pat-left { width: 100%; border-right: none; border-bottom: 1px solid var(--bdr); }
  .pat-right { overflow: visible; }
}
</style>
</head>
<body>
<script src="js/header.js"></script>

<div class="pat-scene"></div>

<div class="pat-panel">
<div class="pat-inner">

  <!-- EN-TÊTE -->
  <div class="pat-header" id="pat-header">
    <div class="pat-photo-ph" id="pat-av">✦</div>
    <div>
      <div class="pat-name" id="pat-name">Chargement…</div>
      <div class="pat-meta" id="pat-meta"></div>
    </div>
    <div class="pat-actions">
      <a href="dossier_patient.html" class="btn btn-sm">← Dossiers</a>

      <button class="btn btn-sm btn-gold" onclick="window.openEdit()">Modifier</button>
    </div>

  <!-- CORPS -->
  <div class="pat-body">

    <!-- COLONNE GAUCHE : infos patient -->

      <div style="color:var(--parch4);font-style:italic;font-size:.8rem">Chargement…</div>

    <!-- COLONNE DROITE : historique visites -->

      <div style="color:var(--parch4);font-style:italic;font-size:.8rem">Chargement…</div>

</div>
</div>

<!-- OVERLAY ÉDITION -->
<div class="edit-overlay hidden" id="edit-overlay">
<div class="edit-panel">
  <div class="edit-title">
    <span>Modifier le dossier</span>
    <button class="btn btn-sm" onclick="closeEdit()">✕</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:0.5rem;align-items:end">
    <div class="form-group"><label class="form-label">Nom</label><input class="form-control" id="e-nom"></div>
    <button type="button" title="Inverser Nom et Prénom" onclick="const n=document.getElementById('e-nom').value,p=document.getElementById('e-prenom').value;document.getElementById('e-nom').value=p;document.getElementById('e-prenom').value=n;" style="margin-bottom:2px;padding:6px 8px;background:none;border:1px solid var(--bdr);color:var(--gold);cursor:pointer;font-size:1rem;line-height:1">⇄</button>
    <div class="form-group"><label class="form-label">Prénom</label><input class="form-control" id="e-prenom"></div>

  </div>
  <div class="form-group"><label class="form-label">Antécédents médicaux</label><textarea class="form-control" id="e-antecedents" style="min-height:60px"></textarea></div>

  <div class="form-group">

      <button type="button" id="photo-tab-file" onclick="setPhotoTab('file')"   style="flex:1;padding:4px;background:none;border:1px solid var(--bdr);color:var(--parch3);font-family:'Cormorant Garamond',serif;font-size:.8rem;cursor:pointer">📁 Fichier</button>

      <div id="ep-ph" style="width:48px;height:48px;background:var(--ink3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;color:var(--parch4)">✦</div>
      <img id="ep-img" style="width:48px;height:48px;object-fit:cover;border:1px solid var(--bdr2);display:none;filter:sepia(10%)" alt="">
    </div>

  <div style="display:flex;gap:8px;margin-top:1rem">

</div>

<script src="js/voice.js"></script>
<script type="module">
import { patientsGetById, patientsUpdate, patientsDelete, patientsAddSeance, patientsDeleteSeance, formatDate } from './js/patients.js';

// Cache médecins pour correspondance
let _medecinsList = [];
async function loadMedecins() {
  if (_medecinsList.length) return;
  // Attend que _fbGetAllMedecins soit disponible (module async)
  for (let i = 0; i < 20; i++) {
    if (window._fbGetAllMedecins) {
      _medecinsList = await window._fbGetAllMedecins().catch(()=>[]);
      return;
    }
    await new Promise(r => setTimeout(r, 150));
  }
}

// Normalise un nom pour comparaison : lowercase + mots triés
function normName(n) { return (n||'').toLowerCase().replace(/[^a-zàâçéèêëîïôùûüæœ ]/gi,'').split(/\s+/).sort().join(' '); }

// Cherche un médecin par son nom RP (exact ou mots dans le désordre)
function findMedecin(nomRp) {
  if (!nomRp) return null;
  const n = normName(nomRp);
  return _medecinsList.find(m => normName((m.prenom||'')+' '+(m.nom||'')) === n || normName((m.nom||'')+' '+(m.prenom||'')) === n) || null;
}

window.openMedPopup = function(uid) {
  const med = _medecinsList.find(m => m.uid === uid);
  if (!med) return;
  const ini = (med.prenom?.[0]||'')+(med.nom?.[0]||'');
  const photo = med.photo
    ? `<img class="med-popup-photo" src="${med.photo}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="med-popup-photo-ph" style="display:none">${ini}</div>`
    : `<div class="med-popup-photo-ph">${ini}</div>`;

  const ROLES = {
    stagiaire:'Stagiaire', apprenti:'Apprenti', medecin:'Médecin', specialiste:'Spécialiste',
    chief:'Chef dispensaire', chief_texas:'Chief Texas', chief_louisiane:'Chief Louisiane',
    doyen:'Doyen', admin:'Admin'
  };
  const roleKey = med.roleRp || (med.role === 'admin' ? 'medecin' : med.role);
  const role = ROLES[roleKey] || ROLES[med.role] || med.roleRp || med.role || 'Médecin';
  const cabinet = med.cabinet ? `<div class="med-popup-cabinet">${med.cabinet}</div>` : '';

  // Certifications uniquement (pas les diplômes d'examen)
  const BADGES_EXCLUS = ['Diplômé Stagiaire','Diplômé Apprenti médecin','Médecin de campagne','Médecin confirmé'];
  const certs = (med.badges||[])
    .filter(b => !BADGES_EXCLUS.includes(b.label||''))
    .map(b => `<span class="med-popup-badge">${b.icon||''} ${b.label||''}</span>`)
    .join('');

  document.getElementById('med-popup-body').innerHTML = `
    ${photo}
    <div class="med-popup-name">Dr. ${med.prenom||''} ${med.nom||''}</div>
    ${cabinet}
    <div class="med-popup-role">${role}</div>
    ${certs ? `<div class="med-popup-badges" style="margin-top:8px">${certs}</div>` : ''}
  `;
  document.getElementById('med-popup-overlay').classList.remove('hidden');
};
const MATERIAUX_COURANTS = [
  'Bandage','Suture','Cataplasme','Éclisse','Compresse','Pansement',
  'Alcool','Eau propre','Laudanum','Morphine','Garrot','Aiguille',
  'Fil de suture','Forceps','Scalpel','Onguent'
];
let _consultTab = 'assistee';
let _materielSelectionne = [];

window.setConsultTab = function(tab) {
  _consultTab = tab;
  document.getElementById('c-mode-assistee').style.display = tab==='assistee' ? '' : 'none';
  document.getElementById('c-mode-simple').style.display   = tab==='simple'   ? '' : 'none';
  document.getElementById('ctab-assistee').style.borderBottomColor = tab==='assistee' ? 'var(--gold)' : 'transparent';
  document.getElementById('ctab-assistee').style.color = tab==='assistee' ? 'var(--gold)' : 'var(--parch3)';
  document.getElementById('ctab-simple').style.borderBottomColor = tab==='simple' ? 'var(--gold)' : 'transparent';
  document.getElementById('ctab-simple').style.color = tab==='simple' ? 'var(--gold)' : 'var(--parch3)';
};

function renderChips() {
  const container = document.getElementById('c-materiel-chips');
  if (!container) return;
  container.innerHTML = MATERIAUX_COURANTS.map(m => {
    const sel = _materielSelectionne.includes(m);
    return `<button onclick="toggleMateriel('${m}')" style="padding:3px 10px;border:1px solid ${sel?'var(--gold)':'var(--bdr)'};background:${sel?'var(--gold-dim)':'none'};color:${sel?'var(--gold)':'var(--parch3)'};font-family:'Cormorant Garamond',serif;font-size:.78rem;cursor:pointer">${m}</button>`;
  }).join('');
}
window.toggleMateriel = function(m) {
  const i = _materielSelectionne.indexOf(m);
  if (i === -1) _materielSelectionne.push(m); else _materielSelectionne.splice(i,1);
  renderChips();
};

window.openConsultModal = async function() {
  _materielSelectionne = [];
  _consultTab = 'assistee';
  ['c-symptomes','c-soins','c-reco','c-texte-libre','c-materiel-input'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('c-err').style.display='none';
  setConsultTab('assistee');
  renderChips();
  // Afficher le nom du médecin connecté
  const label = document.getElementById('c-medecin-label');
  if(label) {
    const profil = window._fbGetProfile ? await window._fbGetProfile().catch(()=>null) : null;
    const nom = profil ? ((profil.prenom||'')+' '+(profil.nom||'')).trim() : '';
    label.textContent = nom ? 'Médecin : Dr. '+nom : 'Médecin : non identifié';
  }
  document.getElementById('consult-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('c-symptomes').focus(), 50);
};
window.closeConsultModal = function() {
  document.getElementById('consult-overlay').classList.add('hidden');
};
window.saveConsult = async function() {
  let resume = '';
  if (_consultTab === 'simple') {
    resume = (document.getElementById('c-texte-libre').value||'').trim();
  } else {
    const sym   = (document.getElementById('c-symptomes').value||'').trim();
    const extra = (document.getElementById('c-materiel-input').value||'').trim();
    const mat   = [..._materielSelectionne, ...(extra?[extra]:[])];
    const soin  = (document.getElementById('c-soins').value||'').trim();
    const reco  = (document.getElementById('c-reco').value||'').trim();
    const parts = [];
    if (sym)       parts.push('**Symptômes**\n'+sym.split('\n').filter(Boolean).map(l=>'• '+l).join('\n'));
    if (mat.length) parts.push('**Matériaux**\n'+mat.map(l=>'• '+l).join('\n'));
    if (soin)      parts.push('**Soins effectués**\n'+soin.split('\n').filter(Boolean).map(l=>'• '+l).join('\n'));
    if (reco)      parts.push('**Recommandations**\n'+reco.split('\n').filter(Boolean).map(l=>'• '+l).join('\n'));
    resume = parts.join('\n');
  }
  if (!resume) { document.getElementById('c-err').style.display='block'; return; }
  const btn = document.getElementById('c-save-btn');
  btn.disabled = true; btn.textContent = 'Enregistrement…';
  const profil = window._fbGetProfile ? await window._fbGetProfile().catch(()=>null) : null;
  const medecin = profil ? ((profil.prenom||'')+' '+(profil.nom||'')).trim() : '';
  await patientsAddSeance(pid, {
    date: new Date().toISOString().split('T')[0],
    humeur: 'Soins / Urgence', medecin, resume,
    createdAt: new Date().toISOString(),
  });
  btn.disabled = false; btn.textContent = 'Enregistrer';
  closeConsultModal();
  patient = await patientsGetById(pid);
  render();
};

window.closeMedPopup = function(e) {
  if (e && e.target !== document.getElementById('med-popup-overlay')) return;
  document.getElementById('med-popup-overlay').classList.add('hidden');
};

function formatResume(text) {
  if (!text) return '—';
  // Texte structuré (contient **...**) → titres gras + puces
  if (text.includes('**')) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .split('\n').map(l=>l.trim()).filter(l=>l).join('<br>');
  }
  // Texte libre → préservation des sauts de ligne, pas de transformation
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<span style="white-space:pre-line">${esc}</span>`;
}

const pid = new URLSearchParams(window.location.search).get('id');
let patient = null;
const SB = { stable:'badge-stable', suivi:'badge-suivi', grave:'badge-grave', decede:'badge-decede' };
const SL = { stable:'Stable', suivi:'En suivi', grave:'Grave / Dangereux', decede:'† Décédé' };

async function load(){
  await loadMedecins();
  patient = await patientsGetById(pid);
  if(!patient){
    document.getElementById('pat-name').textContent = 'Dossier introuvable';
    document.getElementById('pat-left').innerHTML = '<a href="dossier_patient.html" class="btn btn-sm">← Retour</a>';
    document.getElementById('pat-right').innerHTML = '';
    return;
  }
  render();
}

function render(){
  const p = patient;
  const initials = (p.prenom?.[0]||'')+(p.nom?.[0]||'');

  // En-tête
  document.getElementById('pat-name').textContent = `${p.prenom} ${p.nom}`;
  const av = document.getElementById('pat-av');
  if(p.photo){
    av.outerHTML = `<img class="pat-photo" id="pat-av" src="${p.photo}" alt="" onerror="this.style.display='none'">`;
  } else {
    av.textContent = initials;
  }
  document.getElementById('pat-meta').innerHTML =
    `<span class="badge ${SB[p.statut]||'badge-suivi'}">${SL[p.statut]||p.statut}</span>`+
    (p.age ? `<span>· ${p.age} ans</span>` : '')+
    (p.profession ? `<span>· ${p.profession}</span>` : '')+
    (p.telegram ? `<span>· 📡 ${p.telegram}</span>` : '');
  document.getElementById('btn-visite').href = `visite.html?id=${pid}&type=aptitude`;
  document.getElementById('c-visite-btn') && (document.getElementById('c-visite-btn').href = `visite.html?id=${pid}&type=aptitude`);

  // Colonne gauche — infos
  const f = (label, val) => val
    ? `<div class="info-row"><div class="info-label">${label}</div><div class="info-value">${val}</div></div>`
    : `<div class="info-row"><div class="info-label">${label}</div><div class="info-value empty">—</div></div>`;

  // Colonne gauche — photo grande + résumé rapide
  const ini2 = (p.prenom?.[0]||'')+(p.nom?.[0]||'');
  const phStyle = `width:100%;aspect-ratio:3/4;background:var(--ink3);border:1px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:3rem;color:var(--parch4);margin-bottom:.75rem`;
  const photoBlock = p.photo
    ? `<img src="${p.photo}" alt="" style="width:100%;aspect-ratio:3/4;object-fit:cover;border:1px solid var(--bdr2);filter:sepia(15%);margin-bottom:.75rem" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div style="${phStyle};display:none">${ini2}</div>`
    : `<div style="${phStyle}">${ini2}</div>`;

  const decedeOverlay = p.statut === 'decede'
    ? `<div style="position:relative;margin-bottom:.75rem">
        ${photoBlock.replace('margin-bottom:.75rem','margin-bottom:0')}
        <div style="position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;border:1px solid #555">
          <span style="font-family:'Playfair Display',serif;font-size:1.1rem;color:#aaa;letter-spacing:.18em;font-style:italic">† DÉCÉDÉ</span>
        </div>
      </div>`
    : photoBlock;

  document.getElementById('pat-left').innerHTML = `
    ${decedeOverlay}
    <div style="font-family:'Playfair Display',serif;font-size:1.1rem;color:${p.statut==='decede'?'#888':'var(--parch)'};font-style:italic;margin-bottom:.25rem;${p.statut==='decede'?'text-decoration:line-through;opacity:.7':''}">${p.prenom} ${p.nom}</div>
    <div style="margin-bottom:.85rem"><span class="badge ${SB[p.statut]||'badge-suivi'}">${SL[p.statut]||p.statut}</span></div>

    <div class="info-section-title">Identité</div>
    ${f('Âge', p.age ? p.age+' ans' : '')}
    ${f('Télégramme', p.telegram)}
    ${f('Profession', p.profession)}
    ${f('Groupe sanguin', p.groupeSanguin)}
    ${f('Mensurations', p.mensurations || (p.taille && p.poids ? p.taille+' cm / '+p.poids+' kg' : ''))}

    <div class="info-section-title">Médical</div>
    ${f('Antécédents', p.antecedents)}
    ${f('Allergies', p.allergies)}
    ${f('Diagnostic', p.diagnostic)}
    ${f('Traitement', p.traitement)}
  `;

  // Colonne droite — consultations triées (plus récente en haut)
  const seances = [...(p.seances || [])].sort((a,b)=>{
    const da = new Date(a.createdAt || a.date || 0);
    const db = new Date(b.createdAt || b.date || 0);
    return db - da; // décroissant
  });

  const seancesHtml = seances.length
    ? seances.map((s,i)=>`
      <div class="seance-card" ${i===0?'style="border-left-color:var(--gold)"':''}>
        <button class="seance-del" onclick="window.delSeance('${s.id}')">✕</button>
        <div class="seance-card-top">
          <span class="seance-date">${formatDate(s.date)}</span>
          ${i===0?'<span style="font-family:\'Cormorant Garamond\',serif;font-size:.62rem;color:var(--gold);letter-spacing:.1em">DERNIÈRE</span>':''}
          ${s.medecin ? (() => { const med = findMedecin(s.medecin); return med ? `<button class="seance-medecin" onclick="openMedPopup('${med.uid}')">Dr. ${s.medecin}</button>` : `<span class="seance-medecin">Dr. ${s.medecin}</span>`; })() : ''}
          ${s.humeur ? `<span class="seance-type">${s.humeur}</span>` : ''}
        </div>
        <div class="seance-text">${formatResume(s.resume||'—')}</div>
      </div>`).join('')
    : `<div class="seances-empty">Aucune consultation enregistrée.</div>`;

  document.getElementById('pat-right').innerHTML = `
    <div class="seances-title">
      <span>Consultations — ${seances.length}</span>
      <button onclick="openConsultModal()" class="btn btn-sm" style="border-color:var(--gold);color:var(--gold);font-size:.7rem">+ Nouvelle consultation</button>
    </div>
    ${seancesHtml}
  `;
}

window.delSeance = async function(sid){
  if(!confirm('Supprimer cette consultation ?')) return;
  await patientsDeleteSeance(pid, sid);
  patient = await patientsGetById(pid); render();
};

window.openEdit = function(){
  const p = patient;
  ['nom','prenom','age','profession','telegram','groupeSanguin','mensurations','antecedents','allergies','diagnostic','traitement','photo'].forEach(k=>{
    const el = document.getElementById('e-'+k); if(el) el.value = p[k]||'';
  });
  document.getElementById('e-sexe').value = p.sexe||'';
  document.getElementById('e-statut').value = p.statut||'suivi';
  if(p.photo){
    document.getElementById('ep-img').src = p.photo;
    document.getElementById('ep-img').style.display = 'block';
    document.getElementById('ep-ph').style.display = 'none';
  } else {
    document.getElementById('ep-img').style.display = 'none';
    document.getElementById('ep-ph').style.display = 'flex';
  }
  document.getElementById('edit-overlay').classList.remove('hidden');
};
window.closeEdit = ()=> document.getElementById('edit-overlay').classList.add('hidden');
window.setPhotoTab = function(tab) {
  document.getElementById('photo-mode-url').style.display  = tab==='url'  ? '' : 'none';
  document.getElementById('photo-mode-file').style.display = tab==='file' ? '' : 'none';
  document.getElementById('photo-tab-url').style.background  = tab==='url'  ? 'var(--gold-dim)' : 'none';
  document.getElementById('photo-tab-url').style.borderColor = tab==='url'  ? 'var(--gold)' : 'var(--bdr)';
  document.getElementById('photo-tab-url').style.color       = tab==='url'  ? 'var(--gold)' : 'var(--parch3)';
  document.getElementById('photo-tab-file').style.background  = tab==='file' ? 'var(--gold-dim)' : 'none';
  document.getElementById('photo-tab-file').style.borderColor = tab==='file' ? 'var(--gold)' : 'var(--bdr)';
  document.getElementById('photo-tab-file').style.color       = tab==='file' ? 'var(--gold)' : 'var(--parch3)';
};
window.previewEditUrl = function(input){
  const url = input.value.trim();
  const img = document.getElementById('ep-img'); const ph = document.getElementById('ep-ph');
  if(url){ img.src=url; img.style.display='block'; ph.style.display='none'; }
  else { img.style.display='none'; ph.style.display='flex'; }
};
window.previewEditFile = function(input){
  const file = input.files[0]; if(!file) return;
  const img = document.getElementById('ep-img'); const ph = document.getElementById('ep-ph');
  const reader = new FileReader();
  reader.onload = e => { img.src=e.target.result; img.style.display='block'; ph.style.display='none'; };
  reader.readAsDataURL(file);
};
window.saveEdit = async function(){
  const btn = document.getElementById('save-btn'); btn.textContent='Enregistrement…'; btn.disabled=true;
  const data = {};
  ['nom','prenom','age','profession','telegram','groupeSanguin','mensurations','antecedents','allergies','diagnostic','traitement'].forEach(k=>{
    const el = document.getElementById('e-'+k); if(el) data[k]=el.value.trim();
  });
  // Photo : fichier prioritaire sur URL
  const fileInput = document.getElementById('e-photo-file');
  if(fileInput && fileInput.files[0]){
    const statusEl = document.getElementById('photo-upload-status');
    statusEl.textContent = 'Envoi de l\'image…';
    try {
      const apiKey = '28f63d63a3b44f8fbbfda2e788d38f6f';
      const fd = new FormData(); fd.append('image', fileInput.files[0]);
      const res = await fetch('https://api.imgbb.com/1/upload?key='+apiKey, { method:'POST', body:fd });
      const json = await res.json();
      if(json.success){ data.photo = json.data.url; statusEl.textContent = '✓ Image envoyée'; }
      else { statusEl.textContent = 'Erreur upload imgbb'; }
    } catch(e){ statusEl.textContent = 'Erreur réseau'; }
  } else {
    const urlEl = document.getElementById('e-photo'); if(urlEl) data.photo = urlEl.value.trim();
  }
  data.sexe = document.getElementById('e-sexe').value;
  data.statut = document.getElementById('e-statut').value;
  await patientsUpdate(pid, data);
  patient = await patientsGetById(pid);
  closeEdit(); render();
};
window.deletePatient = async function(){
  if(!confirm(`Supprimer définitivement le dossier de ${patient.prenom} ${patient.nom} ?`)) return;
  await patientsDelete(pid); window.location.href='dossier_patient.html';
};

load();
</script>

<!-- Modal nouvelle consultation -->

    <div id="c-medecin-label" style="font-size:.78rem;color:var(--parch3);font-family:'Cormorant Garamond',serif;margin-bottom:.75rem;font-style:italic">Médecin : —</div>

    <!-- Onglets -->
    <div style="display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid var(--bdr)">

    </div>

    <!-- Mode Assistée -->

        <textarea class="form-control" id="c-symptomes" rows="2" placeholder="Ex : plaie au bras gauche, fièvre…"></textarea>
      </div>

        <textarea class="form-control" id="c-soins" rows="2" placeholder="Ex : nettoyage, points de suture x6…"></textarea>

        <label class="form-label">Recommandations</label>
        <textarea class="form-control" id="c-reco" rows="2" placeholder="Ex : repos 3 jours, éviter l'alcool…"></textarea>
      </div>
    </div>

    <!-- Mode Simple -->
    <div id="c-mode-simple" style="display:none">
      <div class="form-group">
        <label class="form-label">Coller votre rapport</label>
        <textarea class="form-control" id="c-texte-libre" rows="8" placeholder="Collez ici votre rapport de consultation…"></textarea>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap">
      <button class="btn btn-gold w-full" id="c-save-btn" onclick="saveConsult()">Enregistrer</button>
    </div>
    <div id="c-err" style="color:#c07070;font-size:.8rem;margin-top:.5rem;display:none">Veuillez remplir au moins un champ.</div>
  </div>
</div>

<div class="med-popup-overlay hidden" id="med-popup-overlay" onclick="closeMedPopup(event)">
  <div class="med-popup" id="med-popup">
    <button class="med-popup-close" onclick="closeMedPopup()">✕</button>

</div>
