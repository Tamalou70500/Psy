<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Cabinet du Dr. Abernathy Lucius</title>
<link rel="stylesheet" href="css/style.css">
<script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('psy_theme')||'dark'); })();</script>
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.bg-grid { position:fixed; inset:0; pointer-events:none; background-image: repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(192,154,74,0.03) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(192,154,74,0.03) 60px); }
.wrap { width:100%; max-width:400px; padding:1rem; position:relative; z-index:1; }
.seal-area { text-align:center; margin-bottom:1.5rem; }
.seal { display:inline-block; animation:drop 1s cubic-bezier(.22,.61,.36,1) both; }
@keyframes drop { 0%{transform:translateY(-60px) scale(0.5) rotate(-20deg);opacity:0} 65%{transform:translateY(5px) scale(1.06) rotate(2deg);opacity:1} 100%{transform:translateY(0) scale(1) rotate(0);opacity:1} }
.login-card { background:var(--ink2); border:1px solid var(--bdr2); padding:2rem 1.75rem; position:relative; }
.login-card::before { content:''; position:absolute; inset:5px; border:1px solid rgba(192,154,74,0.07); pointer-events:none; }
.doc-name { font-family:'Playfair Display',serif; font-size:1.45rem; color:var(--parch); text-align:center; }
.doc-role { font-family:'Cormorant Garamond',serif; font-size:0.68rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--parch3); text-align:center; margin-bottom:1.75rem; }
.sep { display:flex; align-items:center; gap:.75rem; margin-bottom:1.25rem; }
.sep::before,.sep::after { content:''; flex:1; height:1px; background:var(--bdr); }
.sep span { font-family:'Cormorant Garamond',serif; font-size:0.62rem; letter-spacing:0.2em; color:var(--parch4); text-transform:uppercase; }
.btn-google { width:100%; padding:0.8rem 1rem; background:var(--ink3); border:1px solid var(--bdr2); color:var(--parch); font-family:'Cormorant Garamond',serif; font-size:0.9rem; letter-spacing:0.06em; cursor:pointer; transition:all .25s; display:flex; align-items:center; justify-content:center; gap:0.85rem; }
.btn-google:hover { background:var(--ink4); border-color:var(--gold); }
.btn-google:disabled { opacity:.5; cursor:not-allowed; }
.btn-google svg { width:20px; height:20px; flex-shrink:0; }
.login-desc { font-family:'EB Garamond',serif; font-size:0.88rem; color:var(--parch3); text-align:center; line-height:1.65; margin-bottom:1.5rem; font-style:italic; }
.loading-msg { text-align:center; padding:.75rem; font-family:'EB Garamond',serif; font-size:0.9rem; color:var(--parch3); font-style:italic; display:none; }
.error-msg { text-align:center; padding:.6rem; font-family:'EB Garamond',serif; font-size:0.88rem; color:#c07070; display:none; margin-top:.75rem; border:1px solid rgba(154,24,24,.3); background:rgba(154,24,24,.06); }
.footer-txt { text-align:center; margin-top:1.25rem; font-family:'Cormorant Garamond',serif; font-size:0.72rem; color:var(--parch4); font-style:italic; }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="wrap">
  <div class="seal-area">
    <div class="seal">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <circle cx="36" cy="36" r="34" stroke="rgba(192,154,74,0.3)" stroke-width="1.5"/>
        <circle cx="36" cy="36" r="28" stroke="rgba(192,154,74,0.15)" stroke-width="1"/>
        <text x="36" y="40" text-anchor="middle" font-family="Playfair Display, serif" font-size="22" fill="rgba(192,154,74,0.7)" font-style="italic">✦</text>
      </svg>
    </div>
  </div>

  <div class="login-card">
    <div class="doc-name">Cabinet Médical du Nouveau Monde</div>
    <div class="doc-role">École de Saint-Denis · 1904</div>

    <!-- FORMULAIRE COMPTE RP (affiché par défaut si mode RP) -->
    <div id="form-rp" style="display:none">
      <div id="rp-tabs" style="display:flex;gap:0;margin-bottom:1.25rem;border-bottom:1px solid var(--bdr)">
        <button onclick="setRpTab('connexion')" id="tab-connexion"
          style="flex:1;padding:.55rem;background:transparent;border:none;border-bottom:2px solid var(--gold);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer">
          Se connecter
        </button>
        <button onclick="setRpTab('creer')" id="tab-creer"
          style="flex:1;padding:.55rem;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--parch3);font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer">
          Créer un compte
        </button>
      </div>

      <div style="margin-bottom:.85rem">
        <label style="font-family:'Cormorant Garamond',serif;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--parch3);display:block;margin-bottom:.4rem">
          Identifiant RP
        </label>
        <input id="rp-id" type="text" placeholder="ex: drlucius · cowboy70 · docteur1904"
          style="width:100%;padding:.65rem .85rem;background:var(--ink3);border:1px solid var(--bdr);color:var(--parch);font-family:'EB Garamond',serif;font-size:.92rem;box-sizing:border-box;outline:none"
          onfocus="this.style.borderColor='var(--bdr2)'" onblur="this.style.borderColor='var(--bdr)'"
          onkeydown="if(event.key==='Enter')document.getElementById('rp-pwd').focus()">
      </div>

      <div style="margin-bottom:1.1rem">
        <label style="font-family:'Cormorant Garamond',serif;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--parch3);display:block;margin-bottom:.4rem">
          Mot de passe
        </label>
        <input id="rp-pwd" type="password" placeholder="Minimum 6 caractères"
          style="width:100%;padding:.65rem .85rem;background:var(--ink3);border:1px solid var(--bdr);color:var(--parch);font-family:'EB Garamond',serif;font-size:.92rem;box-sizing:border-box;outline:none"
          onfocus="this.style.borderColor='var(--bdr2)'" onblur="this.style.borderColor='var(--bdr)'"
          onkeydown="if(event.key==='Enter')doRpAction()">
      </div>

      <button class="btn-google" id="btn-rp" onclick="doRpAction()" style="border-color:var(--gold);color:var(--gold)">
        <span id="btn-rp-label">Se connecter</span>
      </button>

      <button onclick="setRpTab(null)" style="width:100%;margin-top:.6rem;padding:.4rem;background:transparent;border:none;color:var(--parch4);font-family:'Cormorant Garamond',serif;font-size:.65rem;letter-spacing:.1em;cursor:pointer;text-decoration:underline">
        ← Retour
      </button>
    </div>

    <!-- CHOIX MÉTHODE (affiché par défaut) -->
    <div id="form-choix">
      <p class="login-desc">Choisissez votre méthode de connexion</p>

      <!-- Compte RP -->
      <button class="btn-google" onclick="setRpTab('connexion')" style="margin-bottom:.75rem;border-color:var(--gold)">
        <span style="font-size:1.1rem">🤠</span>
        Compte RP — identifiant + mot de passe
      </button>

      <div class="sep"><span>ou</span></div>

      <!-- Google -->
      <button class="btn-google" id="btn-google" onclick="doSignIn()">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continuer avec Google
      </button>
    </div>

    <div class="loading-msg" id="loading-msg">Connexion en cours…</div>
    <div class="error-msg"   id="error-msg"></div>

    <p style="font-family:'EB Garamond',serif;font-size:.78rem;color:var(--parch4);text-align:center;margin-top:1.25rem;font-style:italic;line-height:1.6">
      Accès réservé aux médecins du cabinet.<br>
      Contactez le Chef de cabinet pour rejoindre.
    </p>

    <div style="border-top:1px solid var(--bdr);margin-top:1.25rem;padding-top:1.1rem;text-align:center">
      <p style="font-family:'EB Garamond',serif;font-size:.82rem;color:var(--parch3);font-style:italic;margin:0 0 .75rem">
        Juste passer voir ? Entrez en tant que visiteur.
      </p>
      <button onclick="enterAsVisitor()" style="background:none;border:1px solid var(--bdr);color:var(--parch3);padding:8px 20px;font-family:'Cormorant Garamond',serif;font-size:.88rem;letter-spacing:.06em;cursor:pointer;transition:all .2s;width:100%"
        onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--parch)'"
        onmouseout="this.style.borderColor='var(--bdr)';this.style.color='var(--parch3)'">
        Continuer en visiteur
      </button>
    </div>
  </div>
</div>

<script type="module" src="js/auth-firebase.js"></script>
<script>
function enterAsVisitor(){
  sessionStorage.setItem('visiteur', '1');
  window.location.href = 'index.html';
}

// Gère le retour depuis signInWithRedirect (mobile Google)
var redirectHandled = false;
var checkRedirect = setInterval(function(){
  if(!window._fbHandleRedirect) return;
  clearInterval(checkRedirect);
  window._fbHandleRedirect().then(function(res){
    redirectHandled = true;
    if(!res) return; // pas de redirect en cours
    if(res.error){ showError('Erreur Google : ' + res.error); return; }
    var p = res.profil;
    window.location.href = (p && p.profilOk) ? 'dossier_patient.html' : 'setup-profil.html';
  });
}, 80);

// Si déjà connecté (session existante) → rediriger, mais seulement après avoir vérifié le redirect
var checkReady = setInterval(function(){
  if(!window._fbOnReady) return;
  clearInterval(checkReady);
  // Attendre 1.5s que handleRedirectResult ait eu le temps de traiter
  setTimeout(function(){
    window._fbOnReady(function(user){
      if(!user) return;
      window._fbGetProfile().then(function(p){
        if(p && p.profilOk) {
          window.location.href = 'dossier_patient.html';
          return;
        }
        // Profil absent ou incomplet : bandeau, pas de redirection automatique
        if(document.getElementById('session-banner')) return;
        var msg = document.createElement('div');
        msg.id = 'session-banner';
        msg.style.cssText = 'background:#2a1f0a;border:1px solid #6b4f1e;color:#c9a84c;padding:10px 16px;margin-bottom:14px;font-family:"Cormorant Garamond",serif;font-size:.9rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap';
        msg.innerHTML = '<span>Session active — votre fiche de personnage est incomplète.</span>'
          + '<div style="display:flex;gap:8px">'
          + '<button onclick="window.location.href=\'setup-profil.html\'" style="background:#6b4f1e;border:none;color:#e8d5a0;padding:4px 12px;cursor:pointer;font-family:inherit;font-size:.85rem">Compléter ma fiche →</button>'
          + '<button onclick="window._fbSignOut&&window._fbSignOut().then(()=>this.closest(\'#session-banner\').remove())" style="background:none;border:1px solid #6b4f1e;color:#c9a84c;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:.85rem">Se déconnecter</button>'
          + '</div>';
        var card = document.querySelector('.login-card');
        if(card) card.insertAdjacentElement('beforebegin', msg);
        else document.body.prepend(msg);
      });
    });
  }, 1500);
}, 80);

// ── Google ────────────────────────────────────────────
// Appel direct sans setInterval pour que le popup ne soit pas bloqué sur mobile
function doSignIn(){
  var btn = document.getElementById('btn-google');
  if(!window._fbSignIn){ showError('Chargement en cours, réessayez dans un instant.'); return; }
  btn.disabled = true;
  showLoading(true);
  window._fbSignIn().then(function(res){
    var p = res && res.profil;
    window.location.href = (p && p.profilOk) ? 'dossier_patient.html' : 'setup-profil.html';
  }).catch(function(e){
    btn.disabled = false;
    showLoading(false);
    showError('Erreur Google : ' + (e.message||'Réessayez'));
  });
}

// ── Compte RP ─────────────────────────────────────────
var rpMode = 'connexion'; // 'connexion' ou 'creer'

function setRpTab(mode){
  if(!mode){
    document.getElementById('form-rp').style.display    = 'none';
    document.getElementById('form-choix').style.display = 'block';
    showLoading(false); showError('');
    return;
  }
  rpMode = mode;
  document.getElementById('form-rp').style.display    = 'block';
  document.getElementById('form-choix').style.display = 'none';
  showLoading(false); showError('');

  // Styles des onglets
  var gold = 'var(--gold)', grey = 'var(--parch3)';
  document.getElementById('tab-connexion').style.borderBottomColor = (mode==='connexion') ? gold : 'transparent';
  document.getElementById('tab-connexion').style.color             = (mode==='connexion') ? gold : grey;
  document.getElementById('tab-creer').style.borderBottomColor    = (mode==='creer') ? gold : 'transparent';
  document.getElementById('tab-creer').style.color                = (mode==='creer') ? gold : grey;
  document.getElementById('btn-rp-label').textContent = (mode==='creer') ? 'Créer mon compte' : 'Se connecter';

  // Focus
  setTimeout(function(){ document.getElementById('rp-id').focus(); }, 100);
}

function doRpAction(){
  var id  = document.getElementById('rp-id').value.trim();
  var pwd = document.getElementById('rp-pwd').value;
  if(!id){ showError('Entrez un identifiant.'); return; }
  if(pwd.length < 6){ showError('Mot de passe trop court — minimum 6 caractères.'); return; }

  var btn = document.getElementById('btn-rp');
  btn.disabled = true;
  showLoading(true); showError('');

  var fnName = (rpMode === 'creer') ? '_fbCreateEmail' : '_fbSignInEmail';
  waitFb(fnName, function(fn){
    fn(id, pwd).then(function(res){
      var p = res.profil;
      window.location.href = (p && p.profilOk) ? 'dossier_patient.html' : 'setup-profil.html';
    }).catch(function(e){
      btn.disabled = false;
      showLoading(false);
      showError(e.message || 'Erreur — réessayez.');
    });
  });
}

// ── Utils ─────────────────────────────────────────────
function waitFb(fnName, cb){
  var t = 0;
  var iv = setInterval(function(){
    t++;
    if(window[fnName]){ clearInterval(iv); cb(window[fnName]); }
    else if(t > 60){ clearInterval(iv); showError('Erreur de chargement — rechargez la page.'); }
  }, 80);
}

function showLoading(on){
  document.getElementById('loading-msg').style.display = on ? 'block' : 'none';
}
function showError(msg){
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
</script>

</body>
</html>
