<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dossiers — Cabinet du Dr. Abernathy Lucius</title>
<link rel="stylesheet" href="css/style.css">

<!-- Sélecteur de thème -->
</head>
<body>
<script src="js/header.js"></script>



<div class="page-band">
  <div>
    <span class="eyebrow">Cabinet · Sunset, Texas · 1904</span>
    <h2>Dossiers des patients</h2>
  </div>
  <button class="btn btn-gold" onclick="openModal()">+ Ouvrir un dossier</button>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">⚲</span>
    <input class="form-control" type="text" id="search" placeholder="Nom, diagnostic, origine…" oninput="renderGrid()" style="background:var(--ink3);">
  </div>
  <div class="filters">
    <button class="fpill active" onclick="setS(this,'all')">Tous</button>
    <button class="fpill" onclick="setS(this,'stable')">Stable</button>
    <button class="fpill" onclick="setS(this,'suivi')">En suivi</button>
    <button class="fpill" onclick="setS(this,'grave')">Grave</button>
  </div>
</div>

<div class="stat-bar">
  <span class="label" id="count-label">—</span>
</div>

<div class="grid" id="grid">
  <div class="empty-state"><strong>Chargement</strong>Consultation des archives…</div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal">
<div class="modal">
  <div class="modal-title">
    <span>Nouveau dossier patient</span>
    <button class="btn btn-sm" onclick="closeModal()">✕</button>
  </div>
  <div class="form-row-2">
    <div class="form-group"><label class="form-label">Nom *</label><input class="form-control" id="f-nom" placeholder="Dalton"></div>
    <div class="form-group"><label class="form-label">Prénom *</label><input class="form-control" id="f-prenom" placeholder="Jack"></div>
  </div>
  <div class="form-row-2">
    <div class="form-group"><label class="form-label">Âge</label><input class="form-control" type="number" id="f-age" placeholder="35"></div>
    <div class="form-group"><label class="form-label">Sexe</label>
      <select class="form-control" id="f-sexe"><option value="">—</option><option value="M">Masculin</option><option value="F">Féminin</option></select>
    </div>
  </div>
  <div class="form-row-2">
    <div class="form-group"><label class="form-label">Origine</label><input class="form-control" id="f-origine" placeholder="Blackwater"></div>
    <div class="form-group"><label class="form-label">Profession</label><input class="form-control" id="f-profession" placeholder="Éleveur"></div>
  </div>
  <div class="form-group"><label class="form-label">Statut clinique</label>
    <select class="form-control" id="f-statut"><option value="suivi">En suivi</option><option value="stable">Stable</option><option value="grave">Grave</option></select>
  </div>
  <div class="form-group"><label class="form-label">Diagnostic initial</label><input class="form-control" id="f-diagnostic" placeholder="Mélancolie, neurasthénie…"></div>
  <div class="form-group">
    <label class="form-label">Portrait du patient (URL)</label>
    <div class="photo-preview-wrap">
      <div class="photo-ph" id="pp">✦</div>
      <img class="photo-thumb" id="pi" alt="">
    </div>
    <input class="form-control mt-1" id="f-photo" placeholder="https://cdn.discordapp.com/… ou imgur.com/…" oninput="previewUrl(this,'pi','pp')">
    <p class="url-hint">Lien direct vers l'image (Discord CDN, Imgur, etc.)</p>
  </div>
  <div id="merr" class="alert alert-error hidden">Nom et prénom requis.</div>
  <div style="display:flex;gap:8px;margin-top:1rem">
    <button class="btn w-full" onclick="closeModal()">Annuler</button>
    <button class="btn btn-gold w-full" id="cbtn" onclick="createPatient()">Ouvrir le dossier</button>
  </div>
</div>
</div>


<script type="module">
import { patientsLoad, patientsCreate } from './js/patients.js';
// Auth Firebase


const SB = { stable:'badge-stable', suivi:'badge-suivi', grave:'badge-grave' };
const SL = { stable:'Stable', suivi:'En suivi', grave:'Grave' };
let all=[], activeS='all';

async function loadAll(){ all = await patientsLoad(); renderGrid(); }

window.renderGrid = function(){
  const q = document.getElementById('search').value.toLowerCase();
  let list = [...all];
  if(q) list = list.filter(p=>(p.nom+p.prenom+(p.diagnostic||'')+(p.origine||'')).toLowerCase().includes(q));
  if(activeS!=='all') list = list.filter(p=>p.statut===activeS);
  const lbl = document.getElementById('count-label');
  lbl.textContent = `${list.length} dossier${list.length!==1?'s':''} — ${all.length} au total`;
  const g = document.getElementById('grid');
  if(!list.length){
    g.innerHTML='<div class="empty-state"><strong>Aucun dossier</strong>Aucun patient ne correspond à cette recherche.</div>';
    return;
  }
  g.innerHTML = list.map(p=>{
    const initials = (p.prenom?.[0]||'')+(p.nom?.[0]||'');
    const av = p.photo
      ? `<img class="avatar" src="${p.photo}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`+`<div class="avatar-ph" style="display:none">${initials}</div>`
      : `<div class="avatar-ph">${initials}</div>`;
    const nb = (p.seances||[]).length;
    return `<a class="pcard fade-up" href="patient.html?id=${p.id}">
      <div class="pcard-head">${av}<div>
        <div class="pcard-name">${p.prenom} ${p.nom}</div>
        <div class="pcard-meta">${p.age?p.age+' ans · ':''}${p.origine||'—'}</div>
      </div></div>
      ${p.diagnostic?`<div class="pcard-diag">${p.diagnostic}</div>`:''}
      <div class="pcard-foot">
        <span class="badge ${SB[p.statut]||'badge-suivi'}">${SL[p.statut]||p.statut}</span>
        <span class="pcard-seances">${nb} séance${nb!==1?'s':''}</span>
      </div>
    </a>`;
  }).join('');
};

window.setS = function(el,s){
  document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); activeS=s; renderGrid();
};
window.openModal  = ()=>{ document.getElementById('modal').classList.remove('hidden'); document.getElementById('f-nom').focus(); };
window.closeModal = ()=>{
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('merr').classList.add('hidden');
  ['f-nom','f-prenom','f-age','f-origine','f-profession','f-diagnostic','f-photo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-sexe').value=''; document.getElementById('f-statut').value='suivi';
  document.getElementById('pi').style.display='none'; document.getElementById('pp').style.display='flex';
};
window.previewUrl = function(input, imgId, phId){
  const url = input.value.trim();
  const img = document.getElementById(imgId);
  const ph  = document.getElementById(phId);
  if(url){ img.src=url; img.style.display='block'; ph.style.display='none'; }
  else   { img.style.display='none'; ph.style.display='flex'; }
};
window.createPatient = async function(){
  const nom=document.getElementById('f-nom').value.trim();
  const prenom=document.getElementById('f-prenom').value.trim();
  if(!nom||!prenom){ document.getElementById('merr').classList.remove('hidden'); return; }
  const btn=document.getElementById('cbtn'); btn.textContent='Création…'; btn.disabled=true;
  const p = await patientsCreate({
    nom, prenom,
    age:        document.getElementById('f-age').value,
    sexe:       document.getElementById('f-sexe').value,
    origine:    document.getElementById('f-origine').value.trim(),
    profession: document.getElementById('f-profession').value.trim(),
    statut:     document.getElementById('f-statut').value,
    diagnostic: document.getElementById('f-diagnostic').value.trim(),
    photo:      document.getElementById('f-photo').value.trim()
  });
  closeModal(); window.location.href='patient.html?id='+p.id;
};
loadAll();
</script>

<script type="module" src="js/auth-firebase.js"></script>
<script src="js/guard.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var t = localStorage.getItem('psy_theme') || 'dark';
  var f = localStorage.getItem('psy_font')  || 'victorien';
  document.documentElement.setAttribute('data-theme', t);
  document.documentElement.setAttribute('data-font', f);
  document.querySelectorAll('.theme-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.theme === t);
  });
  guardPage({ minGrade:'stagiaire', requirePatients:true,  minGrade: 'apprenti', onReady: function(p){
    if(window._patientsLoad) window._patientsLoad().then(function(list){ renderPatients(list); });
  }});
});
</script>
</body>
</html>
