<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dossiers — École de Médecine 1904</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ═══ BUREAU IMMERSIF (PC) ═══════════════════════════════════ */
.desk-scene {
  position: fixed; inset: 0;
  background: url('images/desk/Le fond principal .png') center center / cover no-repeat;
  z-index: 0;
}
.desk-scene::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(10,6,2,0.38);
}

/* Objets décoratifs positionnés sur le bureau */
.desk-obj {
  position: fixed;
  pointer-events: none;
  z-index: 2;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.55));
  opacity: 0;
  animation: objAppear 0.6s ease forwards;
}
@keyframes objAppear { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.desk-lamp   { bottom: 12%; left: 3%;  width: 160px; animation-delay: 0.1s; }
.desk-stet   { bottom: 6%;  left: 18%; width: 130px; animation-delay: 0.2s; }
.desk-watch  { top: 18%;    right: 5%; width: 90px;  animation-delay: 0.3s; }
.desk-loupe  { bottom: 20%; right: 3%; width: 110px; animation-delay: 0.4s; }
.desk-encrier{ top: 14%;    left: 5%;  width: 80px;  animation-delay: 0.5s; }
.desk-scalpel{ bottom: 35%; right: 8%; width: 120px; animation-delay: 0.25s; transform: rotate(-15deg); }

/* ═══ DOSSIER CENTRAL ════════════════════════════════════════ */
.desk-content {
  position: fixed;
  inset: 0;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  padding-top: 54px;
}

.folder-wrap {
  width: min(860px, 92vw);
  pointer-events: all;
  animation: folderOpen 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes folderOpen {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.folder-content {
  display: flex;
  flex-direction: column;
  gap: 0;
  background: color-mix(in srgb, var(--ink) 80%, transparent);
  backdrop-filter: blur(12px);
  border: 1px solid var(--bdr2);
  padding: 1.5rem;
  max-height: calc(100vh - 100px);
  overflow: hidden;
}

.folder-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--bdr);
}
.folder-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-style: italic;
  color: var(--parch);
  letter-spacing: 0.02em;
}
.folder-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--parch2);
  display: block;
  margin-bottom: 2px;
}
.folder-btn {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid var(--gold-d);
  color: var(--gold);
  padding: 5px 14px;
  background: var(--gold-dim);
  cursor: pointer;
  transition: background .2s;
}
.folder-btn:hover { background: var(--gold-dim2); border-color: var(--gold); }

/* Barre recherche */
.folder-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.folder-search {
  flex: 1;
  min-width: 160px;
  background: var(--ink3);
  border: 1px solid var(--bdr);
  padding: 5px 10px;
  font-family: 'EB Garamond', serif;
  font-size: 0.9rem;
  color: var(--parch);
  outline: none;
  transition: border-color .2s;
}
.folder-search::placeholder { color: var(--parch3); font-style: italic; }
.folder-search:focus { border-color: var(--gold); background: var(--ink4); }
.fpill-paper {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.58rem;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--bdr);
  color: var(--parch3);
  background: transparent;
  cursor: pointer;
  transition: all .15s;
}
.fpill-paper:hover,
.fpill-paper.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold-d); }

/* Pagination */
.pagination { display:flex; align-items:center; justify-content:center; gap:8px; padding:10px 0 4px; }
.page-btn {
  background: none; border: 1px solid var(--bdr); color: var(--parch2);
  padding: 4px 12px; cursor: pointer; font-family:'Cormorant Garamond',serif; font-size:0.85rem;
  transition: all .15s;
}
.page-btn:hover:not([disabled]) { background: var(--gold-dim); color: var(--gold); border-color: var(--gold-d); }
.page-btn[disabled] { opacity: 0.3; cursor: default; }
.page-info { font-family:'Cormorant Garamond',serif; font-size:0.78rem; color:var(--parch3); letter-spacing:.06em; }

/* Toggle vue */
.view-toggle { display:flex; gap:4px; }
.view-btn {
  background: none; border: 1px solid var(--bdr); color: var(--parch3);
  padding: 3px 8px; cursor: pointer; font-size: 0.78rem; transition: all .15s;
}
.view-btn.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold-d); }

/* Grille des fiches patients */
.folder-grid {
  flex: 1;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-d) transparent;
}
.folder-grid::-webkit-scrollbar { width: 4px; }
.folder-grid::-webkit-scrollbar-thumb { background: var(--gold-d); }

/* Vue liste */
.folder-grid.view-list {
  display: flex; flex-direction: column; gap: 0;
  grid-template-columns: unset;
}
.folder-grid.view-list .fiche {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 12px; min-height: 0; overflow: hidden;
}
.folder-grid.view-list .fiche::before { display: none; }
.folder-grid.view-list .fiche:hover { transform: none; box-shadow: none; background: var(--ink3); }
.folder-grid.view-list .fiche-head { margin-bottom: 0; flex-shrink: 0; min-width: 0; }
.folder-grid.view-list .fiche-av, .folder-grid.view-list .fiche-av-ph { width: 32px; height: 32px; font-size: 0.65rem; }
.folder-grid.view-list .fiche-head > div { min-width: 160px; max-width: 200px; overflow: hidden; }
.folder-grid.view-list .fiche-body { flex: 1; min-width: 0; display: flex; align-items: center; gap: 12px; overflow: hidden; }
.folder-grid.view-list .fiche-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.folder-grid.view-list .fiche-meta { white-space: nowrap; display: block; }
.folder-grid.view-list .fiche-diag { margin-bottom: 0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.folder-grid.view-list .fiche-foot { border-top: none; padding-top: 0; flex-shrink: 0; gap: 8px; }

/* Vue grandes miniatures */
.folder-grid.view-big {
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}
.folder-grid.view-big .fiche-av { width: 100%; height: 130px; object-fit: cover; border: none; }
.folder-grid.view-big .fiche-av-ph { width: 100%; height: 130px; font-size: 1.5rem; border: none; }
.folder-grid.view-big .fiche-head { flex-direction: column; align-items: flex-start; gap: 4px; }
.folder-grid.view-big .fiche-diag { display: none; }

/* Fiche patient individuelle */
.fiche {
  background: var(--ink2);
  border: 1px solid var(--bdr);
  padding: 10px 12px;
  cursor: pointer;
  text-decoration: none;
  display: block;
  transition: background .15s, transform .15s, box-shadow .15s;
  position: relative;
  overflow: hidden;
}
.fiche::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  transition: background .15s;
}
.fiche:hover {
  background: var(--ink3);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  text-decoration: none;
}
.fiche:hover::before { background: var(--gold); }

.fiche-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.fiche-av {
  width: 36px; height: 36px; flex-shrink: 0;
  object-fit: cover;
  border: 1px solid var(--bdr2);
}
.fiche-av-ph {
  width: 36px; height: 36px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--ink3);
  border: 1px solid var(--bdr);
  font-family: 'Playfair Display', serif;
  font-size: 0.75rem;
  color: var(--parch2);
  font-style: italic;
}
.fiche-name {
  font-family: 'Playfair Display', serif;
  font-size: 0.88rem;
  color: var(--parch);
  display: block;
  font-style: italic;
  line-height: 1.2;
}
.fiche-meta {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.58rem;
  color: var(--parch3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.fiche-diag {
  font-family: 'EB Garamond', serif;
  font-size: 0.78rem;
  color: var(--parch2);
  font-style: italic;
  line-height: 1.4;
  margin-bottom: 6px;
}
.fiche-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 6px;
  border-top: 1px solid var(--bdr);
}
.fiche-seances {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.58rem;
  color: var(--parch3);
  letter-spacing: 0.08em;
}

/* Badges — réutilise les classes du design system */
.badge-p { display: inline-block; padding: 1px 7px; font-family: 'Cormorant Garamond', serif; font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid transparent; }

/* Stat en bas du dossier */
.folder-stat {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--parch3);
  text-align: right;
  padding-top: 6px;
  border-top: 1px solid var(--bdr);
  margin-top: 8px;
}

/* Tampon animé */
.tampon {
  position: absolute;
  bottom: 12%; right: 10%;
  width: 90px;
  opacity: 0;
  transform: scale(1.4) rotate(-8deg);
  animation: stamp 0.25s ease 1.2s forwards;
  pointer-events: none;
  z-index: 4;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}
@keyframes stamp {
  0%  { opacity: 0; transform: scale(1.8) rotate(-8deg); }
  60% { opacity: 1; transform: scale(0.95) rotate(-8deg); }
  80% { transform: scale(1.05) rotate(-8deg); }
  100%{ opacity: 0.85; transform: scale(1) rotate(-8deg); }
}

/* ═══ NAVBAR sur le bureau ════════════════════════════════════ */
nav.navbar {
  position: fixed !important;
  top: 0; left: 0; right: 0;
  z-index: 10 !important;
  background: color-mix(in srgb, var(--ink) 92%, transparent) !important;
  backdrop-filter: blur(12px);
}

/* ═══ MOBILE — liste propre ══════════════════════════════════ */
.mobile-view { display: none; }

@media(max-width: 768px) {
  .desk-scene, .desk-obj, .desk-content { display: none; }
  .mobile-view { display: block; }
  nav.navbar { position: sticky !important; }

  .mob-band {
    background: var(--ink2);
    border-bottom: 3px solid transparent;
    border-image: linear-gradient(90deg, var(--gold-d), var(--gold), var(--gold-d)) 1;
    padding: 1.25rem 1rem 1rem;
    position: relative;
  }
  .mob-band::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,var(--gold-d),var(--gold)); }
  .mob-band-eye { font-family:'Cormorant Garamond',serif; font-size:0.6rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold2); display:block; margin-bottom:4px; }
  .mob-band-title { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; color:var(--parch); }

  .mob-toolbar { padding:0.75rem 1rem; display:flex; flex-direction:column; gap:8px; border-bottom:1px solid var(--bdr); background:var(--ink); }
  .mob-search { width:100%; background:var(--ink2); border:1px solid var(--bdr); padding:8px 12px; font-family:'EB Garamond',serif; font-size:1rem; color:var(--parch); outline:none; }
  .mob-filters { display:flex; gap:4px; flex-wrap:wrap; }

  .mob-grid { display:flex; flex-direction:column; gap:1px; background:var(--bdr); }
  .mob-fiche {
    background:var(--ink2);
    padding:12px 16px;
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    transition:background .15s;
    position:relative;
  }
  .mob-fiche::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:transparent; transition:background .2s; }
  .mob-fiche:hover { background:var(--ink3); }
  .mob-fiche:hover::before { background:var(--gold); }
  .mob-av { width:44px; height:44px; flex-shrink:0; border:1px solid var(--bdr2); display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:0.9rem; font-style:italic; color:var(--parch2); background:var(--ink3); object-fit:cover; }
  .mob-info { flex:1; min-width:0; }
  .mob-name { font-family:'Playfair Display',serif; font-size:1rem; font-style:italic; color:var(--parch); display:block; }
  .mob-meta { font-family:'Cormorant Garamond',serif; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--parch4); }
  .mob-diag { font-family:'EB Garamond',serif; font-size:0.85rem; color:var(--parch2); font-style:italic; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mob-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
  .mob-add { position:fixed; bottom:1.5rem; right:1.5rem; width:54px; height:54px; border-radius:50%; background:var(--gold); color:var(--ink); font-size:1.5rem; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.4); z-index:50; font-family:serif; }
  .mob-stat { font-family:'Cormorant Garamond',serif; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--parch3); padding:0.6rem 1rem; background:var(--ink); border-bottom:1px solid var(--bdr); }
}
</style>
</head>
<body>
<script src="js/header.js"></script>

<div class="desk-scene"></div>

<!-- Objets décoratifs -->
<img class="desk-obj desk-lamp"    src="images/desk/lampehuile.png"   alt="">
<img class="desk-obj desk-stet"    src="images/desk/stetoscope.png"   alt="">
<img class="desk-obj desk-watch"   src="images/desk/montre.png"       alt="">
<img class="desk-obj desk-loupe"   src="images/desk/loupe.png"        alt="">
<img class="desk-obj desk-encrier" src="images/desk/encrier.png"      alt="">
<img class="desk-obj desk-scalpel" src="images/desk/scalpel.png"      alt="">
<img class="tampon" src="images/desk/tampon.png" alt="">

<div class="desk-content">
  <div class="folder-wrap">
    <div class="folder-content">
      <div class="folder-header">
        <div>
          <span class="folder-eyebrow">Cabinet · Sunset, Texas · 1904</span>
          <div class="folder-title">Dossiers des patients</div>
        </div>
      </div>
      <!-- Message accès refusé (masqué par défaut) -->
      <div id="acces-refuse" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;text-align:center;gap:1rem">
        <div style="font-size:2.5rem;opacity:0.35">🔒</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;color:var(--parch)">Accès non accordé</div>
        <div style="font-family:'EB Garamond',serif;font-size:0.9rem;color:var(--parch3);line-height:1.7;max-width:360px">L'accès aux dossiers patients doit être autorisé par votre chef de dispensaire.</div>
      </div>
      <!-- Contenu principal (masqué jusqu'à vérification) -->
      <div id="patient-content" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="folder-toolbar">
          <input class="folder-search" type="text" id="search-pc" placeholder="Nom, diagnostic, origine…" oninput="renderAll()">
          <button class="fpill-paper active" onclick="setFilter(this,'all')">Tous</button>
          <button class="fpill-paper" onclick="setFilter(this,'stable')">Stable</button>
          <button class="fpill-paper" onclick="setFilter(this,'suivi')">Suivi</button>
          <button class="fpill-paper" onclick="setFilter(this,'grave')">Grave</button>
          <button class="fpill-paper" onclick="setFilter(this,'decede')">† Décédé</button>
          <div class="view-toggle">
            <button class="view-btn active" id="sbtn-alpha" onclick="setSort('alpha')" title="Alphabétique">A→Z</button>
            <button class="view-btn" id="sbtn-consult" onclick="setSort('consult')" title="Dernière consultation">🕐</button>
          </div>
          <div class="view-toggle" style="margin-left:auto">
            <button class="view-btn active" id="vbtn-grid" onclick="setView('grid')" title="Grille">▦</button>
            <button class="view-btn" id="vbtn-big"  onclick="setView('big')"  title="Miniatures">⊞</button>
            <button class="view-btn" id="vbtn-list" onclick="setView('list')" title="Liste">☰</button>
          </div>
        </div>
        <div class="folder-grid" id="grid-pc"></div>
        <div class="folder-stat" id="stat-pc">Chargement…</div>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE -->
<div class="mobile-view">
  <div class="mob-band">
    <span class="mob-band-eye">Cabinet · Texas · 1904</span>
    <div class="mob-band-title">Dossiers</div>
  </div>
  <div id="mob-acces-refuse" style="display:none;padding:2.5rem 1.5rem;text-align:center">
    <div style="font-size:2rem;opacity:0.3;margin-bottom:1rem">🔒</div>
    <div style="font-family:'Playfair Display',serif;font-size:1.05rem;font-style:italic;color:var(--parch);margin-bottom:.5rem">Accès non accordé</div>
    <div style="font-family:'EB Garamond',serif;font-size:0.9rem;color:var(--parch3);line-height:1.7">Contactez votre chef de dispensaire.</div>
  </div>
  <div id="mob-patient-content" style="display:none">
    <div class="mob-toolbar">
      <input class="mob-search form-control" type="text" id="search-mob" placeholder="Nom, diagnostic…" oninput="renderAll()">
      <div class="mob-filters">
        <button class="fpill active" onclick="setFilter(this,'all')">Tous</button>
        <button class="fpill" onclick="setFilter(this,'stable')">Stable</button>
        <button class="fpill" onclick="setFilter(this,'suivi')">Suivi</button>
        <button class="fpill" onclick="setFilter(this,'grave')">Grave</button>
      </div>
    </div>
    <div class="mob-stat" id="stat-mob">Chargement…</div>
    <div class="mob-grid" id="grid-mob"></div>
  </div>
</div>

<script type="module">
import { patientsLoad } from './js/patients.js';

const CHIEF_ROLES = ['chief','chief_texas','chief_louisiane','admin'];
const SB = { stable:'badge-stable', suivi:'badge-suivi', grave:'badge-grave', decede:'badge-decede' };
const SL = { stable:'Stable', suivi:'En suivi', grave:'Grave', decede:'† Décédé' };
const PAGE_SIZE = { grid:12, big:8, list:20 };
let all = [], activeS = 'all', currentPage = 0, filteredList = [];

async function loadAll(){ all = await patientsLoad(); renderAll(); }
window.loadAll = loadAll;

function ficheCardHtml(p) {
  const ini = (p.prenom?.[0]||'')+(p.nom?.[0]||'');
  const av = p.photo
    ? `<img class="fiche-av" src="${p.photo}" alt="" onerror="this.style.display='none'">`
    : `<div class="fiche-av-ph">${ini}</div>`;
  const nb = (p.seances||[]).length;
  const metaParts = [p.age?p.age+' ans':null, p.origine||null].filter(Boolean);
  const nomAff = [p.prenom, p.nom].filter(Boolean).join(' ');
  return `<a class="fiche fade-up" href="patient.html?id=${p.id}">
    <div class="fiche-head">${av}<div>
      <span class="fiche-name">${nomAff}</span>
      ${metaParts.length?`<span class="fiche-meta">${metaParts.join(' · ')}</span>`:''}
    </div></div>
    <div class="fiche-body">
      ${p.diagnostic?`<div class="fiche-diag">${p.diagnostic}</div>`:''}
    </div>
    <div class="fiche-foot">
      <span class="badge-p ${SB[p.statut]||'badge-suivi'}">${SL[p.statut]||p.statut}</span>
      <span class="fiche-seances">${nb} séance${nb!==1?'s':''}</span>
    </div>
  </a>`;
}

function renderPagination(total, page, perPage) {
  const pages = Math.ceil(total / perPage);
  if (pages <= 1) return '';
  const prev = page > 0 ? `<button class="page-btn" onclick="goPage(${page-1})">‹ Préc.</button>` : `<button class="page-btn" disabled>‹ Préc.</button>`;
  const next = page < pages-1 ? `<button class="page-btn" onclick="goPage(${page+1})">Suiv. ›</button>` : `<button class="page-btn" disabled>Suiv. ›</button>`;
  return `<div class="pagination">${prev}<span class="page-info">Page ${page+1} / ${pages}</span>${next}</div>`;
}

window.goPage = function(p){ currentPage = p; renderGrid(); };

function renderGrid() {
  const gpc = document.getElementById('grid-pc');
  if (!gpc) return;
  const perPage = PAGE_SIZE[currentView] || 12;
  const total = filteredList.length;
  const start = currentPage * perPage;
  const page = filteredList.slice(start, start + perPage);
  const empty = '<div class="empty-state"><strong>Aucun dossier</strong>Aucun patient ne correspond.</div>';
  if (!total) { gpc.innerHTML = empty; document.getElementById('stat-pc').textContent = '0 dossier'; return; }
  gpc.innerHTML = page.map(ficheCardHtml).join('');
  document.getElementById('stat-pc').textContent =
    `${total} dossier${total!==1?'s':''} — page ${currentPage+1}/${Math.ceil(total/perPage)}`;
  let pag = document.getElementById('pagination-pc');
  if (!pag) { pag = document.createElement('div'); pag.id='pagination-pc'; gpc.parentNode.insertBefore(pag, gpc.nextSibling); }
  pag.innerHTML = renderPagination(total, currentPage, perPage);
}

window.renderAll = function(){
  const q = (document.getElementById('search-pc')?.value || '').toLowerCase();
  filteredList = [...all];
  if(q) filteredList = filteredList.filter(p=>(p.nom+p.prenom+(p.diagnostic||'')+(p.origine||'')).toLowerCase().includes(q));
  if(activeS !== 'all') filteredList = filteredList.filter(p=>p.statut === activeS);
  if(currentSort === 'alpha') {
    filteredList.sort((a,b)=>(a.nom||a.prenom||'').localeCompare(b.nom||b.prenom||'', 'fr'));
  } else {
    filteredList.sort((a,b)=>{
      const da = Math.max(...(a.seances||[]).map(s=>new Date(s.createdAt||s.date||0).getTime()), new Date(a.createdAt||0).getTime());
      const db2 = Math.max(...(b.seances||[]).map(s=>new Date(s.createdAt||s.date||0).getTime()), new Date(b.createdAt||0).getTime());
      return db2 - da;
    });
  }
  currentPage = 0;
  renderGrid();
  const gmob = document.getElementById('grid-mob');
  if(gmob) {
    const empty = '<div class="empty-state"><strong>Aucun dossier</strong>Aucun patient ne correspond.</div>';
    if(!filteredList.length){ gmob.innerHTML = empty; return; }
    gmob.innerHTML = filteredList.map(p=>{
      const ini = (p.prenom?.[0]||'')+(p.nom?.[0]||'');
      const av = p.photo
        ? `<img class="mob-av" src="${p.photo}" alt="" onerror="this.style.display='none'">`
        : `<div class="mob-av">${ini}</div>`;
      const nb = (p.seances||[]).length;
      const metaParts = [p.age?p.age+' ans':null, p.origine||null].filter(Boolean);
      const nomAff = [p.prenom, p.nom].filter(Boolean).join(' ');
      return `<a class="mob-fiche" href="patient.html?id=${p.id}">
        ${av}
        <div class="mob-info">
          <span class="mob-name">${nomAff}</span>
          ${metaParts.length?`<span class="mob-meta">${metaParts.join(' · ')}</span>`:''}
          ${p.diagnostic?`<div class="mob-diag">${p.diagnostic}</div>`:''}
        </div>
        <div class="mob-right">
          <span class="badge ${SB[p.statut]||'badge-suivi'}">${SL[p.statut]||p.statut}</span>
          <span class="mob-meta">${nb} séance${nb!==1?'s':''}</span>
        </div>
      </a>`;
    }).join('');
  }
};

window.setFilter = function(el, s){
  document.querySelectorAll('.fpill-paper, .fpill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); activeS = s; renderAll();
};

let currentView = localStorage.getItem('dpPatView') || 'grid';
window.setView = function(v){
  currentView = v; localStorage.setItem('dpPatView', v);
  const grid = document.getElementById('grid-pc');
  grid.classList.remove('view-list','view-big');
  if(v !== 'grid') grid.classList.add('view-'+v);
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('vbtn-'+v)?.classList.add('active');
  currentPage = 0; renderGrid();
};
window.addEventListener('DOMContentLoaded', ()=>{ setView(currentView); setSort(currentSort, true); });

let currentSort = localStorage.getItem('dpPatSort') || 'alpha';
window.setSort = function(s, init=false){
  currentSort = s; localStorage.setItem('dpPatSort', s);
  document.querySelectorAll('[id^="sbtn-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('sbtn-'+s)?.classList.add('active');
  if(!init) renderAll();
};
</script>

<script type="module" src="js/auth-firebase.js"></script>
<script src="js/guard.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var t = localStorage.getItem('psy_theme') || 'dark';
  var f = localStorage.getItem('psy_font')  || 'victorien';
  document.documentElement.setAttribute('data-theme', t);
  document.documentElement.setAttribute('data-font', f);
});
window.addEventListener('load', function(){
  var CHIEF_ROLES = ['chief','chief_texas','chief_louisiane','admin'];
  var waitG = setInterval(function(){
    if(!window._fbOnReady) return;
    clearInterval(waitG);
    window._fbOnReady(function(user){
      if(!user){ window.location.href='login.html'; return; }
      window._fbGetProfile().then(function(p){
        if(!p){ window.location.href='login.html'; return; }
        var nb=document.getElementById('navbar-user');
        if(nb) nb.textContent=(p.prenom||'')+' '+(p.nom||'');
        var lb=document.getElementById('logout-btn');
        if(lb) lb.onclick=function(){ window._fbSignOut(); };
        if(!p.accesPatients && !CHIEF_ROLES.includes(p.role)){
          document.getElementById('acces-refuse').style.display='flex';
          document.getElementById('mob-acces-refuse').style.display='block';
          return;
        }
        document.getElementById('patient-content').style.display='flex';
        document.getElementById('mob-patient-content').style.display='block';
        window.loadAll();
      });
    });
  }, 80);
});
</script>
